<svg width="1440" height="320" viewBox="0 0 1440 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">EGM - Evidence-Gated Graph Memory</title>
  <desc id="desc">A minimal banner for Evidence-Gated Graph Memory with a gate-shaped graph mark and centered product text.</desc>
  <defs>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="0.55" stop-color="#0F9F6E"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="line" x1="455" y1="250" x2="985" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB" stop-opacity="0"/>
      <stop offset="0.22" stop-color="#2563EB"/>
      <stop offset="0.52" stop-color="#0F9F6E"/>
      <stop offset="0.8" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="22" y="14" width="1396" height="292" rx="28" fill="#FBFCF8"/>
  <rect x="22.75" y="14.75" width="1394.5" height="290.5" rx="27.25" stroke="#D9E2EC" stroke-width="1.5"/>

  <g opacity="0.52">
    <path d="M145 252C270 189 397 246 520 188C658 123 782 204 920 155C1084 96 1198 165 1297 113" stroke="#E2E8F0" stroke-width="2"/>
    <path d="M145 72C284 121 376 74 498 118C660 176 810 84 952 131C1104 181 1206 112 1297 156" stroke="#E5E7EB" stroke-width="2"/>
  </g>

  <g transform="translate(474 80)" filter="url(#softShadow)">
    <rect x="0" y="0" width="160" height="160" rx="38" fill="#FFFFFF"/>
    <rect x="1" y="1" width="158" height="158" rx="37" stroke="#D7DEE8" stroke-width="2"/>

    <path d="M47 110V72C47 51 60 38 80 38C100 38 113 51 113 72V110" stroke="url(#mark)" stroke-width="12" stroke-linecap="round"/>
    <path d="M47 110H113" stroke="#111827" stroke-width="12" stroke-linecap="round"/>

    <circle cx="80" cy="73" r="13" fill="#111827"/>
    <circle cx="51" cy="111" r="10" fill="#2563EB"/>
    <circle cx="109" cy="111" r="10" fill="#0F9F6E"/>
    <circle cx="80" cy="130" r="10" fill="#F59E0B"/>
    <path d="M80 86L51 111M80 86L109 111M51 111L80 130M109 111L80 130" stroke="#111827" stroke-width="4.5" stroke-linecap="round"/>
  </g>

  <g transform="translate(676 92)">
    <text x="0" y="58" fill="#111827" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="76" font-weight="850" letter-spacing="0.5">EGM</text>
    <text x="3" y="104" fill="#1F2937" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="34" font-weight="750">Evidence-Gated Graph Memory</text>
    <text x="5" y="143" fill="#64748B" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="22" font-weight="600">Memory that keeps the map, the evidence, and the gate.</text>
  </g>

  <path d="M455 252H985" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>
</svg>
